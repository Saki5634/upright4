/* &#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;
   STATE
&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552; */
const state = {};
topics.forEach(t => {
  state[t.id] = { fill: 0, mc: 0, done: false };
});

/* &#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;
   BUILD UI
&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552; */
function buildNav() {
  const nav = document.getElementById('navTabs');
  const chips = document.getElementById('scoreChips');
  topics.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (i === 0 ? ' active' : '');
    btn.id = 'tab_' + t.id;
    btn.textContent = (i+1) + '. ' + t.title;
    btn.onclick = () => switchTab(t.id);
    nav.appendChild(btn);

    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.id = 'chip_' + t.id;
    chip.innerHTML = `<span class="dot"></span>${t.title}`;
    chips.appendChild(chip);
  });
}

function buildSections() {
  const main = document.getElementById('mainContent');
  topics.forEach((t, ti) => {
    const sec = document.createElement('div');
    sec.className = 'section' + (ti === 0 ? ' active' : '');
    sec.id = 'sec_' + t.id;

    let html = `<div class="progress-wrap">
      <div class="progress-label" id="prog_label_${t.id}">ยังไม่ได้ทำ</div>
      <div class="progress-bar"><div class="progress-fill" id="prog_${t.id}"></div></div>
    </div>`;

    t.parts.forEach((part, pi) => {
      const pid = `${t.id}_p${pi}`;
      html += buildPart(part, pid, t.id);
    });

    sec.innerHTML = html;
    main.appendChild(sec);
  });
}

function buildPart(part, pid, tid) {
  const labels = ['ส่วนที่ 1','ส่วนที่ 2','ส่วนที่ 3'];
  const pNum = pid.split('_p')[1];
  let html = `<div class="ex-card">
    <div class="ex-card-head">
      <span class="part-badge">${labels[pNum]}</span>
      <h3>${part.title}</h3>
    </div>
    <div class="ex-card-body">`;

  if (part.type === 'fill') {
    part.questions.forEach((q, qi) => {
      html += `<div class="fill-q">
        <span class="q-num">${qi+1}.</span>
        ${formatFill(q.q, pid, qi)}
      </div>`;
    });
    html += `<div class="btn-row">
      <button class="btn-check" onclick="checkFill('${pid}','${tid}')">ตรวจคำตอบ</button>
      <button class="btn-answer" onclick="toggleAns('ans_${pid}')">ดูเฉลย</button>
    </div>`;
    html += `<div class="score-result" id="score_${pid}"></div>`;
    html += buildAnswerKey(part.answers, pid);

  } else if (part.type === 'struct') {
    part.questions.forEach((q, qi) => {
      html += `<div class="struct-q">
        <p><span class="q-num">${qi+1}.</span>${q}</p>
        <textarea class="write-area" placeholder="เขียนคำตอบที่นี่..."></textarea>
      </div>`;
    });
    html += `<div class="btn-row">
      <button class="btn-answer" onclick="toggleAns('ans_${pid}')">ดูเฉลย</button>
    </div>`;
    html += buildAnswerKey(part.answers, pid);

  } else if (part.type === 'mc') {
    part.questions.forEach((q, qi) => {
      html += `<div class="mc-q" id="mcq_${pid}_${qi}">
        <p class="q-text"><span class="q-num">${qi+1}.</span>${q.q}</p>
        <div class="choices">`;
      q.opts.forEach((opt, oi) => {
        html += `<label class="choice-label" id="cl_${pid}_${qi}_${oi}">
          <input type="radio" name="mc_${pid}_${qi}" value="${oi}"> ${opt}
        </label>`;
      });
      html += `</div></div>`;
    });
    html += `<div class="btn-row">
      <button class="btn-check" onclick="checkMC('${pid}','${tid}')">ตรวจคำตอบ</button>
      <button class="btn-answer" onclick="toggleAns('ans_${pid}')">ดูเฉลย</button>
    </div>`;
    html += `<div class="score-result" id="score_${pid}"></div>`;
    html += buildMCAnswerKey(part, pid);
  }

  html += `</div></div>`;
  return html;
}

function formatFill(q, pid, qi) {
  let idx = 0;
  return q.replace(/___/g, () => {
    const id = `fill_${pid}_${qi}_${idx++}`;
    return `<input type="text" class="fill-input" id="${id}" placeholder="...">`;
  });
}

function buildAnswerKey(answers, pid) {
  let html = `<div class="answer-key" id="ans_${pid}"><h4>&#128273; เฉลย</h4>`;
  answers.forEach((a, i) => {
    html += `<div class="ans-item"><b>${i+1}.</b> ${a}</div>`;
  });
  return html + '</div>';
}

function buildMCAnswerKey(part, pid) {
  let html = `<div class="answer-key" id="ans_${pid}"><h4>&#128273; เฉลย</h4>`;
  part.questions.forEach((q, i) => {
    html += `<div class="ans-item"><b>${i+1}.</b> ${q.opts[q.a]}</div>`;
  });
  return html + '</div>';
}

/* &#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;
   INTERACTIONS
&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552; */
function switchTab(tid) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('sec_' + tid).classList.add('active');
  document.getElementById('tab_' + tid).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleAns(id) {
  const el = document.getElementById(id);
  el.classList.toggle('show');
}

function checkFill(pid, tid) {
  const topicIdx = topics.findIndex(t => t.id === tid);
  const partIdx = parseInt(pid.split('_p')[1]);
  const part = topics[topicIdx].parts[partIdx];
  let correct = 0, total = 0;

  part.questions.forEach((q, qi) => {
    let idx = 0;
    const inp = document.getElementById(`fill_${pid}_${qi}_${idx}`);
    if (!inp) return;
    const val = inp.value.trim().toLowerCase();
    const accepted = q.a.map(a => a.toLowerCase());
    total++;
    if (accepted.includes(val)) {
      inp.classList.add('correct'); inp.classList.remove('wrong'); correct++;
    } else {
      inp.classList.add('wrong'); inp.classList.remove('correct');
    }
  });

  showScore(`score_${pid}`, correct, total);
  state[tid].fill = correct;
  updateProgress(tid);
}

function checkMC(pid, tid) {
  const topicIdx = topics.findIndex(t => t.id === tid);
  const partIdx = parseInt(pid.split('_p')[1]);
  const part = topics[topicIdx].parts[partIdx];
  let correct = 0, total = part.questions.length;

  part.questions.forEach((q, qi) => {
    const selected = document.querySelector(`input[name="mc_${pid}_${qi}"]:checked`);
    q.opts.forEach((opt, oi) => {
      const lbl = document.getElementById(`cl_${pid}_${qi}_${oi}`);
      lbl.classList.remove('correct-choice','wrong-choice');
    });
    if (!selected) return;
    const val = parseInt(selected.value);
    const correctLbl = document.getElementById(`cl_${pid}_${qi}_${q.a}`);
    if (val === q.a) {
      correctLbl.classList.add('correct-choice'); correct++;
    } else {
      document.getElementById(`cl_${pid}_${qi}_${val}`).classList.add('wrong-choice');
      correctLbl.classList.add('correct-choice');
    }
  });

  showScore(`score_${pid}`, correct, total);
  state[tid].mc = correct;
  updateProgress(tid);
}

function showScore(id, correct, total) {
  const el = document.getElementById(id);
  const pct = correct / total;
  el.classList.remove('great','good','try');
  if (pct >= 0.8) el.classList.add('great');
  else if (pct >= 0.5) el.classList.add('good');
  else el.classList.add('try');
  const emoji = pct >= 0.8 ? 'Excellent!' : pct >= 0.5 ? 'Good!' : 'Try again!';
  el.textContent = `${emoji} ได้ ${correct} จาก ${total} คะแนน`;
  el.classList.add('show');
}

function updateProgress(tid) {
  const t = topics.find(t => t.id === tid);
  const fillPart = t.parts.find(p => p.type === 'fill');
  const mcPart = t.parts.find(p => p.type === 'mc');
  const maxFill = fillPart ? fillPart.questions.length : 0;
  const maxMC = mcPart ? mcPart.questions.length : 0;
  const total = maxFill + maxMC;
  const score = state[tid].fill + state[tid].mc;
  const pct = total > 0 ? (score / total) * 100 : 0;

  document.getElementById('prog_' + tid).style.width = pct + '%';
  document.getElementById('prog_label_' + tid).textContent =
    `คะแนนรวม: ${score}/${total} (${Math.round(pct)}%)`;

  if (score > 0) {
    state[tid].done = true;
    document.getElementById('chip_' + tid).classList.add('done');
    document.getElementById('tab_' + tid).classList.add('completed');
  }
  updateTotal();
}

function updateTotal() {
  let total = 0;
  topics.forEach(t => { total += state[t.id].fill + state[t.id].mc; });
  document.getElementById('totalScore').textContent = `รวม: ${total} คะแนน`;
}

function resetAll() {
  if (!confirm('ต้องการเริ่มใหม่ทั้งหมดหรือไม่?')) return;
  location.reload();
}

/* &#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;
   INIT
&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552; */
buildNav();
buildSections();
</script>
<div id="bottomnav"></div>
<script src="nav.js"></script>
